<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Genie OS Ultimate - Visual Fix</title>
        <style>
            :root {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
            }
            body,
            html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #000;
                user-select: none;
                -webkit-user-select: none;
                touch-action: none;
            }
            canvas {
                display: block;
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0;
                left: 0;
            }
            #ui-layer {
                display: none;
                pointer-events: none;
            }
            #gpu-layer {
                outline: none;
                -webkit-tap-highlight-color: transparent;
                cursor: default;
            }
            #loading {
                position: fixed;
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                background: #000;
                color: #fff;
                z-index: 999;
                transition: opacity 0.5s;
            }
            .bar {
                width: 200px;
                height: 3px;
                background: #222;
                margin-top: 20px;
                position: relative;
                overflow: hidden;
                border-radius: 2px;
            }
            .bar::after {
                content: "";
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                width: 40%;
                background: #d0bcff;
                animation: p 1.5s infinite ease-in-out;
            }
            @keyframes p {
                0% {
                    left: -40%;
                }
                50% {
                    left: 40%;
                    width: 60%;
                }
                100% {
                    left: 100%;
                }
            }
        </style>
    </head>
    <body>
        <div id="loading">
            <div
                style="
                    font-size: 12px;
                    letter-spacing: 4px;
                    opacity: 0.8;
                    font-weight: bold;
                "
            >
                SYSTEM READY
            </div>
            <div class="bar"></div>
        </div>

        <canvas id="ui-layer"></canvas>
        <canvas id="gpu-layer"></canvas>

                arrowLeft:
                    "M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z",
            };

            const Input = {
                x: 0,
                y: 0,
                isDown: false,
                click: false,
                dragging: null,
                update(rect) {
                    if (!rect) return { u: 0, v: 0, hover: false };
                    const u = (this.x - rect.x) / rect.w;
                    const v = (this.y - rect.y) / rect.h;
                    return {
                        x: this.x - rect.x,
                        y: this.y - rect.y,
                        u,
                        v,
                        nu: u * 2 - 1,
                        nv: v * 2 - 1,
                        isDown: this.isDown,
                        hover: u >= 0 && u <= 1 && v >= 0 && v <= 1,
                    };
                },
                reset() {
                    this.click = false;
                },
            };

            const AudioSys = {
                ctx: new (window.AudioContext || window.webkitAudioContext)(),
                resumed: false,
                resume() {
                    if (!this.resumed && this.ctx.state === "suspended") {
                        this.ctx.resume();
                        this.resumed = true;
                    }
                },
                playTone(freq, type = "sine", dur = 0.1) {
                    if (this.ctx.state === "suspended") return;
                    const o = this.ctx.createOscillator(),
                        g = this.ctx.createGain();
                    o.type = type;
                    o.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    g.gain.setValueAtTime(
                        0.05 * System.volume,
                        this.ctx.currentTime,
                    );
                    g.gain.exponentialRampToValueAtTime(
                        0.001,
                        this.ctx.currentTime + dur,
                    );
                    o.connect(g);
                    g.connect(this.ctx.destination);
                    o.start();
                    o.stop(this.ctx.currentTime + dur);
                },
            };

            const Theme = {
                colors: {
                    bg: "#000",
                    card: "rgba(30, 30, 35, 0.7)",
                    primary: "#D0BCFF",
                    accent: "#d946ef",
                    text: "#FFF",
                    subtext: "#888",
                    success: "#4ADE80",
                    border: "rgba(255,255,255,0.1)",
                },
                drawIcon(ctx, path, x, y, size, color) {
                    ctx.save();
                    ctx.translate(x, y);
                    const scale = size / 24;
                    ctx.scale(scale, scale);
                    ctx.translate(-12, -12);
                    ctx.fillStyle = color;
                    ctx.fill(new Path2D(path));
                    ctx.restore();
                },
            };

            class Widget {
                constructor(props = {}) {
                    this.frame = { x: 0, y: 0, w: 0, h: 0 };
                    this.props = {
                        children: [],
                        padding: 0,
                        gap: 0,
                        radius: 12,
                        direction: "column",
                        justify: "start",
                        align: "stretch",
                        flex: 0,
                        border: false,
                        clip: false,
                        ...props,
                    };
                    this.props.children = props.children || [];
                    this.props.children.forEach((c) => (c.parent = this));
                }
                layout(x, y, w, h) {
                    this.frame = { x, y, w, h };
                    const {
                        padding: p,
                        gap,
                        direction,
                        justify,
                        align,
                        children,
                    } = this.props;
                    if (!children.length) return;
                    const isRow = direction === "row";
                    const mainSize = isRow ? w : h,
                        crossSize = isRow ? h : w;
                    let totalFlex = 0,
                        usedMain =
                            p * 2 + Math.max(0, gap * (children.length - 1));
                    children.forEach((c) => {
                        if (c.props.flex > 0) totalFlex += c.props.flex;
                        else usedMain += (isRow ? c.props.w : c.props.h) || 50;
                    });
                    const free = Math.max(0, mainSize - usedMain);
                    const unit = totalFlex > 0 ? free / totalFlex : 0;
                    let cursor = p,
                        spacing = gap;
                    if (totalFlex === 0) {
                        if (justify === "center") cursor += free / 2;
                        else if (justify === "end") cursor += free;
                        else if (
                            justify === "space-between" &&
                            children.length > 1
                        )
                            spacing = free / (children.length - 1);
                    }
                    children.forEach((c) => {
                        const childMain = c.props.flex
                            ? c.props.flex * unit
                            : (isRow ? c.props.w : c.props.h) || 50;
                        let childCross =
                            align === "stretch" &&
                            !(isRow ? c.props.h : c.props.w)
                                ? crossSize - p * 2
                                : (isRow ? c.props.h : c.props.w) || 50;
                        let crossPos = p;
                        if (align === "center")
                            crossPos = (crossSize - childCross) / 2;
                        if (isRow)
                            c.layout(
                                x + cursor,
                                y + crossPos,
                                childMain,
                                childCross,
                            );
                        else
                            c.layout(
                                x + crossPos,
                                y + cursor,
                                childCross,
                                childMain,
                            );
                        cursor += childMain + spacing;
                    });
                }
                draw(ctx, t) {
                    const inp = Input.update(this.frame);
                    if (this.props.bgColor) {
                        ctx.fillStyle = this.props.bgColor;
                        ctx.beginPath();
                        ctx.roundRect(
                            this.frame.x,
                            this.frame.y,
                            this.frame.w,
                            this.frame.h,
                            this.props.radius,
                        );
                        ctx.fill();
                    }
                    if (this.props.shader) {
                        ctx.save();
                        ctx.beginPath();
                        ctx.roundRect(
                            this.frame.x,
                            this.frame.y,
                            this.frame.w,
                            this.frame.h,
                            this.props.radius,
                        );
                        ctx.clip();
                        this.props.shader(ctx, t, this.frame, inp);
                        ctx.restore();
                    }
                    if (this.props.border) {
                        ctx.strokeStyle = Theme.colors.border;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.roundRect(
                            this.frame.x,
                            this.frame.y,
                            this.frame.w,
                            this.frame.h,
                            this.props.radius,
                        );
                        ctx.stroke();
                    }
                    this.props.children.forEach((c) => c.draw(ctx, t));
                    if (inp.hover && Input.click && this.props.onClick) {
                        this.props.onClick();
                        Input.click = false;
                    }
                }
                hitTest(x, y) {
                    if (
                        x >= this.frame.x &&
                        x <= this.frame.x + this.frame.w &&
                        y >= this.frame.y &&
                        y <= this.frame.y + this.frame.h
                    ) {
                        for (
                            let i = this.props.children.length - 1;
                            i >= 0;
                            i--
                        ) {
                            const h = this.props.children[i].hitTest(x, y);
                            if (h) return h;
                        }
                        if (
                            this.props.onClick ||
                            this instanceof Slider ||
                            this instanceof Toggle ||
                            this instanceof SynthKey
                        )
                            return this;
                    }
                    return null;
                }
            }

            class Text extends Widget {
                constructor(t, props = {}) {
                    super(props);
                    this.text = t;
                }
                draw(ctx, t) {
                    super.draw(ctx, t);
                    ctx.fillStyle = this.props.color || Theme.colors.text;
                    ctx.font = this.props.font || "16px sans-serif";
                    const align = this.props.textAlign || "center";
                    ctx.textAlign = align === "stretch" ? "center" : align;
                    ctx.textBaseline = "middle";
                    let x = this.frame.x + this.frame.w / 2;
                    if (ctx.textAlign === "left") x = this.frame.x;
                    if (ctx.textAlign === "right")
                        x = this.frame.x + this.frame.w;
                    ctx.fillText(this.text, x, this.frame.y + this.frame.h / 2);
                }
            }

            class IconWidget extends Widget {
                constructor(icon, color, size, props = {}) {
                    super({ ...props, flex: 0 });
                    this.icon = icon;
                    this.color = color;
                    this.size = size;
                }
                draw(ctx, t) {
                    super.draw(ctx, t);
                    Theme.drawIcon(
                        ctx,
                        this.icon,
                        this.frame.x + this.frame.w / 2,
                        this.frame.y + this.frame.h / 2,
                        this.size,
                        this.color,
                    );
                }
            }

            class GlowButton extends Widget {
                constructor(label, onClick, props = {}) {
                    super({
                        ...props,
                        onClick,
                        justify: "center",
                        align: "center",
                        bgColor: Theme.colors.card,
                        border: true,
                    });
                    this.label = label;
                    this.scale = 1.0;
                }
                draw(ctx, t) {
                    const inp = Input.update(this.frame);
                    this.scale +=
                        ((inp.isDown && inp.hover ? 0.95 : 1.0) - this.scale) *
                        0.2;
                    const w = this.frame.w * this.scale,
                        h = this.frame.h * this.scale;
                    const x = this.frame.x + (this.frame.w - w) / 2,
                        y = this.frame.y + (this.frame.h - h) / 2;
                    ctx.save();
                    if (inp.hover) {
                        ctx.shadowColor = Theme.colors.primary;
                        ctx.shadowBlur = 15;
                    }
                    ctx.fillStyle = this.props.bgColor;
                    ctx.beginPath();
                    ctx.roundRect(x, y, w, h, this.props.radius);
                    ctx.fill();
                    ctx.strokeStyle = inp.hover
                        ? Theme.colors.primary
                        : Theme.colors.border;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "#FFF";
                    ctx.font = "bold 14px sans-serif";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    if (this.props.icon)
                        Theme.drawIcon(
                            ctx,
                            this.props.icon,
                            x + w / 2,
                            y + h / 2,
                            24,
                            "#FFF",
                        );
                    else ctx.fillText(this.label, x + w / 2, y + h / 2);
                    ctx.restore();
                    if (inp.hover && Input.click && this.props.onClick) {
                        this.props.onClick();
                        Input.click = false;
                    }
                }
            }

            class Slider extends Widget {
                constructor(value, icon, props = {}) {
                    super({ ...props, h: 36 });
                    this.value = value;
                    this.icon = icon;
                }
                draw(ctx, t) {
                    const inp = Input.update(this.frame);
                    if (inp.isDown && (inp.hover || Input.dragging === this)) {
                        Input.dragging = this;
                        this.value = Math.max(
                            0,
                            Math.min(
                                1,
                                (Input.x - this.frame.x) / this.frame.w,
                            ),
                        );
                        if (this.props.onChange)
                            this.props.onChange(this.value);
                    }
                    const cy = this.frame.y + this.frame.h / 2;
                    ctx.fillStyle = "rgba(255,255,255,0.1)";
                    ctx.beginPath();
                    ctx.roundRect(this.frame.x, cy - 3, this.frame.w, 6, 3);
                    ctx.fill();
                    const activeW = this.frame.w * this.value;
                    ctx.fillStyle = this.props.color || Theme.colors.primary;
                    ctx.beginPath();
                    ctx.roundRect(this.frame.x, cy - 3, activeW, 6, 3);
                    ctx.fill();
                    const kx = this.frame.x + activeW;
                    ctx.shadowColor = this.props.color || Theme.colors.primary;
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = "#FFF";
                    ctx.beginPath();
                    ctx.arc(kx, cy, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    if (this.icon)
                        Theme.drawIcon(
                            ctx,
                            this.icon,
                            this.frame.x - 20,
                            cy,
                            20,
                            "#888",
                        );
                }
            }

            class Toggle extends Widget {
                constructor(isOn, props = {}) {
                    super({ ...props, w: 50, h: 28 });
                    this.isOn = isOn;
                    this.animVal = isOn ? 1 : 0;
                }
                draw(ctx, t) {
                    this.animVal += ((this.isOn ? 1 : 0) - this.animVal) * 0.2;
                    ctx.fillStyle = `rgba(${40 + this.animVal * 100}, ${40 + this.animVal * 180}, ${40 + this.animVal * 100}, 1)`;
                    ctx.beginPath();
                    ctx.roundRect(
                        this.frame.x,
                        this.frame.y,
                        this.frame.w,
                        this.frame.h,
                        14,
                    );
                    ctx.fill();
                    const circleX = this.frame.x + 14 + this.animVal * 22;
                    ctx.fillStyle = "#FFF";
                    ctx.beginPath();
                    ctx.arc(circleX, this.frame.y + 14, 10, 0, Math.PI * 2);
                    ctx.fill();
                    const inp = Input.update(this.frame);
                    if (inp.hover && Input.click) {
                        this.isOn = !this.isOn;
                        AudioSys.playTone(this.isOn ? 800 : 400, "sine", 0.05);
                        Input.click = false;
                    }
                }
            }

            class FluxOrb extends Widget {
                constructor(props) {
                    super(props);
                }
                draw(ctx, t) {
                    const cx = this.frame.x + this.frame.w / 2,
                        cy = this.frame.y + this.frame.h / 2;
                    const r = Math.min(this.frame.w, this.frame.h) * 0.4;
                    const inp = Input.update(this.frame);
                    const dist = Math.sqrt(inp.nu * inp.nu + inp.nv * inp.nv);
                    const hoverFactor = Math.max(0, 1.0 - dist);
                    const dynR = r * (1.0 + hoverFactor * 0.3);

                    const g = ctx.createRadialGradient(
                        cx,
                        cy,
                        dynR * 0.1,
                        cx,
                        cy,
                        dynR,
                    );
                    g.addColorStop(0, "#FFF");
                    g.addColorStop(
                        0.5,
                        this.props.color || Theme.colors.primary,
                    );
                    g.addColorStop(1, "rgba(0,0,0,0)");

                    ctx.globalCompositeOperation = "screen";
                    ctx.fillStyle = g;
                    ctx.beginPath();
                    ctx.arc(cx, cy, dynR, 0, Math.PI * 2);
                    ctx.fill();

                    if (this.props.icon)
                        Theme.drawIcon(
                            ctx,
                            this.props.icon,
                            cx,
                            cy,
                            dynR * 1.2,
                            "#FFF",
                        );

                    ctx.globalCompositeOperation = "source-over";
                    if (inp.hover && Input.click && this.props.onClick) {
                        this.props.onClick();
                        Input.click = false;
                    }
                }
            }

            class AppIcon extends Widget {
                constructor(name, icon, color, onClick, props = {}) {
                    super({
                        ...props,
                        onClick,
                        flex: 1,
                        h: 90,
                        gap: 5,
                        align: "center",
                    });
                    this.name = name;
                    this.icon = icon;
                    this.color = color;
                }
                draw(ctx, t) {
                    const inp = Input.update(this.frame);
                    const scale = inp.isDown && inp.hover ? 0.9 : 1.0;
                    const size = 50 * scale;
                    const cx = this.frame.x + this.frame.w / 2,
                        cy = this.frame.y + 40;

                    // 1. Shadow & Background
                    ctx.save();
                    if (inp.hover) {
                        ctx.shadowColor = this.color;
                        ctx.shadowBlur = 20;
                    }
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.roundRect(cx - size / 2, cy - size / 2, size, size, 14);
                    ctx.fill();
                    ctx.restore();

                    // 2. Gloss (Ellipse) - Drawn BEFORE Icon
                    ctx.fillStyle = "rgba(255,255,255,0.1)";
                    ctx.beginPath();
                    ctx.ellipse(
                        cx,
                        cy - size * 0.3,
                        size * 0.8,
                        size * 0.4,
                        0,
                        0,
                        Math.PI * 2,
                    );
                    ctx.fill();

                    // 3. Icon - Drawn AFTER Gloss (On top)
                    Theme.drawIcon(ctx, this.icon, cx, cy, 32, "#FFF");

                    // 4. Text
                    ctx.fillStyle = "#FFF";
                    ctx.font = "12px sans-serif";
                    ctx.textAlign = "center";
                    ctx.fillText(this.name, cx, cy + size / 2 + 15);

                    if (inp.hover && Input.click && this.props.onClick) {
                        this.props.onClick();
                        Input.click = false;
                    }
                }
            }

            const Spring = {
                val: 0,
                target: 0,
                vel: 0,
                k: 0.08,
                d: 0.85,
                update() {
                    this.vel += (this.target - this.val) * this.k;
                    this.vel *= this.d;
                    this.val += this.vel;
                    return this.val;
                },
            };
            const Router = {
                current: "lock",
                next: null,
                state: "idle",
                go(p) {
                    if (this.state === "idle" && Pages[p]) {
                        this.next = p;
                        this.state = "out";
                        Spring.target = 1;
                    }
                },
                update() {
                    const v = Spring.update();
                    if (this.state === "out" && v > 0.99) {
                        this.current = this.next;
                        this.state = "in";
                        Spring.target = 0;
                        Spring.vel = -0.04;
                    }
                    if (this.state === "in" && v < 0.01) this.state = "idle";
                    return v;
                },
            };

            const WGSL = `
struct Uniforms { time: f32, progress: f32, res: vec2<f32> };
@group(0) @binding(0) var<uniform> u: Uniforms;
@group(0) @binding(1) var s: sampler;
@group(0) @binding(2) var t: texture_2d<f32>;
struct VSOut { @builtin(position) pos: vec4<f32>, @location(0) uv: vec2<f32> };
@vertex fn vs_main(@builtin(vertex_index) i: u32) -> VSOut {
    var p = vec2<f32>(f32((i << 1u) & 2u), f32(i & 2u));
    var out: VSOut; out.pos = vec4<f32>(p * 2.0 - 1.0, 0.0, 1.0); out.uv = vec2<f32>(p.x, 1.0 - p.y); return out;
}
fn genie(uv: vec2<f32>, p: f32) -> vec2<f32> {
    var pos = uv * 2.0 - 1.0;
    let yf = (pos.y + 1.0) * 0.5;
    let squeeze = 1.0 - p * 0.9 * (1.0 - yf*yf);
    pos.x /= squeeze; pos.y += p * (pos.y + 1.8) * 1.5;
    return pos * 0.5 + 0.5;
}
@fragment fn fs_main(in: VSOut) -> @location(0) vec4<f32> {
    var uv = in.uv;
    if(u.progress > 0.001) { uv = genie(uv, u.progress); }
    if(uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) { discard; }
    let shift = u.progress * 0.03;
    let r = textureSample(t, s, uv - vec2(shift, 0.0)).r;
    let g = textureSample(t, s, uv).g;
    let b = textureSample(t, s, uv + vec2(shift, 0.0)).b;
    let dist = length(in.uv - 0.5);
    let vig = 1.0 - dist * 0.5;
    let grain = fract(sin(dot(in.uv * u.time, vec2(12.9, 78.2)))*43758.5) * 0.04;
    return vec4<f32>((vec3(r,g,b) + grain) * vig, 1.0);
}
`;

            async function boot() {
                const uiC = document.getElementById("ui-layer");
                const uiCtx = uiC.getContext("2d", {
                    willReadFrequently: true,
                });
                const gpuC = document.getElementById("gpu-layer");
                const loader = document.getElementById("loading");

                if (!navigator.gpu) {
                    loader.innerHTML = "WEB GPU NOT FOUND";
                    return;
                }

                try {
                    const adapter = await navigator.gpu.requestAdapter();
                    const device = await adapter.requestDevice();
                    const ctx = gpuC.getContext("webgpu");
                    const format = navigator.gpu.getPreferredCanvasFormat();
                    ctx.configure({
                        device,
                        format,
                        alphaMode: "premultiplied",
                    });

                    const mod = device.createShaderModule({ code: WGSL });
                    const pipeline = device.createRenderPipeline({
                        layout: "auto",
                        vertex: { module: mod, entryPoint: "vs_main" },
                        fragment: {
                            module: mod,
                            entryPoint: "fs_main",
                            targets: [{ format }],
                        },
                        primitive: { topology: "triangle-list" },
                    });

                    const uBuf = device.createBuffer({
                        size: 16,
                        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
                    });
                    const sampler = device.createSampler({
                        magFilter: "linear",
                        minFilter: "linear",
                    });

                    let texture;
                    const resize = () => {
                        const dpr = Math.min(window.devicePixelRatio, 2);
                        uiC.width = gpuC.width = window.innerWidth * dpr;
                        uiC.height = gpuC.height = window.innerHeight * dpr;
                        if (texture) texture.destroy();
                        texture = device.createTexture({
                            size: [uiC.width, uiC.height],
                            format: "rgba8unorm",
                            usage:
                                GPUTextureUsage.TEXTURE_BINDING |
                                GPUTextureUsage.COPY_DST |
                                GPUTextureUsage.RENDER_ATTACHMENT,
                        });
                        uiCtx.setTransform(1, 0, 0, 1, 0, 0);
                        uiCtx.scale(dpr, dpr);
                    };
                    window.addEventListener("resize", resize);
                    resize();

                    const ptr = (e) => {
                        const cx =
                            e.clientX !== undefined
                                ? e.clientX
                                : e.touches[0].clientX;
                        const cy =
                            e.clientY !== undefined
                                ? e.clientY
                                : e.touches[0].clientY;
                        Input.x = cx;
                        Input.y = cy;
                        AudioSys.resume();
                    };
                    gpuC.addEventListener("pointerdown", (e) => {
                        Input.isDown = true;
                        Input.click = true;
                        ptr(e);
                    });
                    gpuC.addEventListener("pointermove", (e) => {
                        ptr(e);
                        if (Input.dragging) Input.isDown = true;
                    });
                    const release = () => {
                        Input.isDown = false;
                        Input.dragging = null;
                    };
                    gpuC.addEventListener("pointerup", release);
                    gpuC.addEventListener("pointerleave", release);

                    gpuC.addEventListener(
                        "touchstart",
                        (e) => {
                            Input.isDown = true;
                            Input.click = true;
                            ptr(e);
                        },
                        { passive: false },
                    );
                    gpuC.addEventListener(
                        "touchmove",
                        (e) => {
                            Input.isDown = true;
                            ptr(e);
                            e.preventDefault();
                        },
                        { passive: false },
                    );
                    gpuC.addEventListener("touchend", release);

                    loader.style.opacity = 0;
                    setTimeout(() => loader.remove(), 500);

                    const frame = (t) => {
                        const time = t * 0.001;
                        const prog = Router.update();
                        const g = uiCtx.createLinearGradient(
                            0,
                            0,
                            0,
                            uiC.height / window.devicePixelRatio,
                        );
                        g.addColorStop(0, "#1a0b2e");
                        g.addColorStop(1, "#000");
                        uiCtx.fillStyle = g;
                        uiCtx.fillRect(0, 0, uiC.width, uiC.height);
                        uiCtx.strokeStyle = "rgba(255,255,255,0.03)";
                        uiCtx.lineWidth = 1;
                        uiCtx.beginPath();
                        for (let i = 0; i < window.innerWidth; i += 40) {
                            uiCtx.moveTo(i, 0);
                            uiCtx.lineTo(i, window.innerHeight);
                        }
                        uiCtx.stroke();
                        if (Pages[Router.current]) {
                            Pages[Router.current].layout(
                                0,
                                0,
                                window.innerWidth,
                                window.innerHeight,
                            );
                            Pages[Router.current].draw(uiCtx, time);
                        }
                        if (System.brightness < 1.0) {
                            uiCtx.fillStyle = `rgba(0,0,0,${1.0 - System.brightness})`;
                            uiCtx.fillRect(0, 0, uiC.width, uiC.height);
                        }
                        Input.reset();

                        device.queue.writeBuffer(
                            uBuf,
                            0,
                            new Float32Array([
                                time,
                                prog,
                                uiC.width,
                                uiC.height,
                            ]),
                        );
                        device.queue.copyExternalImageToTexture(
                            { source: uiC },
                            { texture },
                            [uiC.width, uiC.height],
                        );
                        const enc = device.createCommandEncoder();
                        const pass = enc.beginRenderPass({
                            colorAttachments: [
                                {
                                    view: ctx.getCurrentTexture().createView(),
                                    clearValue: { r: 0, g: 0, b: 0, a: 1 },
                                    loadOp: "clear",
                                    storeOp: "store",
                                },
                            ],
                        });
                        pass.setPipeline(pipeline);
                        pass.setBindGroup(
                            0,
                            device.createBindGroup({
                                layout: pipeline.getBindGroupLayout(0),
                                entries: [
                                    { binding: 0, resource: { buffer: uBuf } },
                                    { binding: 1, resource: sampler },
                                    {
                                        binding: 2,
                                        resource: texture.createView(),
                                    },
                                ],
                            }),
                        );
                        pass.draw(3);
                        pass.end();
                        device.queue.submit([enc.finish()]);
                        requestAnimationFrame(frame);
                    };
                    requestAnimationFrame(frame);
                } catch (e) {
                    console.error(e);
                    loader.innerHTML = "ERROR:<br>" + e.message;
                }
            }

            boot();
        </script>
